# =============================================================================
# LaDCast AR Training Config (RouteB matched baseline without terrain)
# =============================================================================

ar_model:
  in_channels: 8
  out_channels: 8
  num_attention_heads: 8
  attention_head_dim: 64
  num_layers: 20
  num_single_layers: 40
  num_refiner_layers: 2
  mlp_ratio: 4.0
  patch_size: 1
  patch_size_t: 1
  qk_norm: "rms_norm"
  rope_theta: 256.0
  rope_axes_dim: [16, 24, 24]
  rope_spatial_grid_start_pos: 0
  rope_spatial_grid_end_pos: null
  spatial_deg2rad: false
  conditioning_tensor_in_channels: 8
  conditioning_tensor_rope_axes_dim: [16, 24, 24]
  incl_time_elapsed: true
  nope: false
  scale_attn_by_lat: false
  terrain_channels: 0

noise_scheduler:
  target: "diffusers.EDMDPMSolverMultistepScheduler"
  params:
    sigma_data: 0.5

noise_sampler:
  P_mean_start: -1.2
  P_std_start: 1.2
  P_mean_end: -1.2
  P_std_end: 1.2

accelerator:
  gradient_accumulation_steps: 1
  mixed_precision: "bf16"
  log_with: "wandb"

optimizer:
  lr: 1.0e-4
  betas: [0.9, 0.999]
  eps: 1.0e-8
  weight_decay: 0.01

lr_scheduler:
  name: "cosine"
  num_warmup_steps: 1000
  num_cycles: 1
  power: 1.0

train_dataloader:
  ds_path: "/home/limaocheng/ladcast/data/routeB_latent_train.zarr"
  start_date: "1979-01-02T00:00:00"
  end_date: "2017-12-31T18:00:00"
  var_name: "latent"
  xr_engine: "zarr"
  batch_size: 2
  input_seq_len: 1
  return_seq_len: 4
  shuffle: true
  num_workers: 0
  sampling_interval: 6
  interval_between_pred: 1
  truncate_first: 0
  data_augmentation: false
  prefetch_factor: 2
  persistent_workers: false
  pin_memory: true
  load_in_memory: false
  transform: "normalize"

ema:
  use_ema: true
  ema_max_decay: 0.9999
  ema_update_after_step: 100
  ema_inv_gamma: 1.0
  ema_power: 0.6667
  foreach: false
  offload_ema: true

general:
  output_dir: "./output/ladcast_no_terrain"
  logging_dir: "logs"
  seed: 42
  channel_names:
    - "geopotential"
    - "specific_humidity"
    - "temperature"
    - "u_component_of_wind"
    - "v_component_of_wind"
    - "10m_u_component_of_wind"
    - "10m_v_component_of_wind"
    - "2m_temperature"
    - "mean_sea_level_pressure"
    - "total_precipitation_6hr"
  scale_lr: false
  num_train_epochs: null
  num_training_steps: 60000
  do_edm_style_training: true
  snr_gamma: null
  checkpointing_steps: 5000
  save_model_epochs: 10
  save_image_epochs: 5
  tracker_project_name: "ladcast-no-terrain"
  subbatch_steps: 1
  symmetry:
    enabled: false
    group: "lon_roll"
    prob: 0.0
    max_shift: 0
